spring:
  application:
    name: accountshield

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true


logging:
  pattern:
    console: "%green(%d{yyyy-MM-dd HH:mm:ss.SSS}) %red([%thread]) %highlight(%-5level) %yellow(%-40.40logger{39}:%L) - %msg%n"

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
    allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}
    allowed-methods: ${CORS_ALLOWED_METHODS:"*"}
    allowed-headers: ${CORS_ALLOWED_HEADERS:"*"}
    max-age: ${CORS_MAX_AGE:3600}
  jwt:
    secret: ${JWT_SECRET:accountshield-development-secret-key-change-me-please-32}
    expiration: ${JWT_EXPIRATION:3600000}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:2592000000}
  admin:
    name: ${ADMIN_NAME:admin1}
    email: ${ADMIN_EMAIL:admin21@gmail.com}
    password: ${ADMIN_PASSWORD:devadmser@12345!}
server:
  port: ${PORT:8080}
